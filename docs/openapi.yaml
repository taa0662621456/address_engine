openapi: 3.0.3
info:
  title: Address API
  version: 1.0.0
  description: API для управления адресами (CRUD + поиск + пагинация)
servers:
  - url: http://localhost:8000

paths:
  /address:
    post:
      summary: Создать адрес
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressDTO'
      responses:
        '201':
          description: Адрес создан
        '400':
          description: Ошибка валидации

  /address/{id}:
    get:
      summary: Получить адрес по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponseDTO'
        '404':
          description: Адрес не найден

  /address/search:
    get:
      summary: Поиск по городу
      parameters:
        - name: city
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Список найденных адресов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressResponseDTO'

  /address/list:
    get:
      summary: Получить список адресов с пагинацией
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Пагинированный список
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponseDTO'

  /address/search-advanced:
    post:
      summary: Расширенный поиск по критериям
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                city: { type: string }
                country: { type: string }
                street: { type: string }
                zipcode: { type: string }
                page: { type: integer }
                limit: { type: integer }
      responses:
        '200':
          description: Результат поиска
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponseDTO'

components:
  schemas:
    AddressDTO:
      type: object
      required: [city, country, street, zipcode]
      properties:
        city: { type: string }
        country: { type: string }
        street: { type: string }
        zipcode: { type: string }

    AddressResponseDTO:
      type: object
      properties:
        id: { type: integer }
        city: { type: string }
        country: { type: string }
        street: { type: string }
        zipcode: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PagedResponseDTO:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AddressResponseDTO'
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
